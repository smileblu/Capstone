ai:
  base-url: http://localhost:8000

carbon:
  won-per-kg-co2: 10  # 원/kg CO2 (K-ETS 시장가 기준)

jwt:
  secret: ${JWT_SECRET:my-super-secret-key-for-local-development-coco-project-2026}
  expiration-ms: 86400000  # 24시간 (ms)

spring:
  config:
    import: "optional:file:.env[.properties]"

  application:
    name: COCO

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PW}

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
